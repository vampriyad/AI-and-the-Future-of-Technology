patterns quickly</li>\n<li>Perform repetitive tasks</li>\n<li>Generate ideas and predictions</li>\n</ul>\n<p>For example, an AI system can analyze millions of documents much faster than a human could.</p>\n<h4>What Humans Do Better</h4>\n<p>Humans have abilities that remain unique.</p>\n<p>People can:</p>\n<ul>\n<li>Understand emotions</li>\n<li>Create meaning</li>\n<li>Make ethical decisions</li>\n<li>Show empathy</li>\n<li>Imagine new possibilities</li>\n</ul>\n<p>A machine can generate a painting, but humans give art its personal meaning and emotional value.</p>\n<h4>The Future of Cooperation</h4>\n<p>The most successful use of AI may come from combining human skills with machine abilities.</p>\n<p>Examples:</p>\n<table>\n<colgroup>\n<col style=\"width: 43%\"/>\n<col style=\"width: 56%\"/>\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Human Ability</strong></th>\n<th><strong>AI Support</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Doctor's experience</td>\n<td>Medical data analysis</td>\n</tr>\n<tr class=\"even\">\n<td>Teacher's guidance</td>\n<td>Personalized learning tools</td>\n</tr>\n<tr class=\"odd\">\n<td>Scientist's ideas</td>\n<td>Faster research</td>\n</tr>\n<tr class=\"even\">\n<td>Designer's creativity</td>\n<td>New design possibilities</td>\n</tr>\n</tbody>\n</table>\n<p>AI can increase human abilities instead of replacing them.</p>\n<h4>Adapting to a New Relationship</h4>\n<p>The relationship between humans and technology has always changed.</p>\n<p>When computers appeared, many people worried about their impact on jobs. Instead, computers created new industries and changed the way people work.</p>\n<p>AI may follow a similar path. The people who understand how to use AI effectively may have new opportunities in the future.</p>\n<h4>Final Thought</h4>\n<p>The future should not be about humans fighting against machines. It should be about humans using technology to achieve things that were previously impossible. Artificial Intelligence is a tool. Its impact will depend on how people choose to develop it, control it, and use it. The future of intelligence may not belong only to humans or machines. It may belong to both working together.</p>\n<h4>My Perspective</h4>\n<p>When I first started researching Artificial Intelligence, I thought AI was mainly about robots that could think like humans. After learning more about the technology, I realized that modern AI is mostly about data, algorithms, and finding patterns.</p>\n<p>What surprised me the most is that many AI systems do not actually \"understand\" information like humans do. They are extremely good at processing information, but the way they work is very different from human thinking.</p>"}, {"num": 25, "title": "Final Thoughts: Building the Future With Technology", "available": true, "words": 316, "minutes": 2, "html": "<p>Artificial Intelligence is one of the biggest technological developments in human history. From simple computer programs to advanced systems that can understand language, analyze information, and create content, AI has developed faster than many people expected. Throughout this book, we explored how AI works, the technologies behind it, its applications in different fields, and the challenges that come with its growth.</p>\n<p>One important idea appears throughout all of these topics:</p>\n<p><strong>AI is not only about machines. It is about how humans use technology.</strong></p>\n<h4>A Tool Created by Humans</h4>\n<p>Artificial Intelligence was created because humans wanted to solve problems and expand their abilities. AI can help doctors discover diseases, help scientists make discoveries, help students learn, and help businesses create better solutions. However, technology itself does not decide whether something is good or bad. The results depend on the choices people make.</p>\n<h4>The Importance of Responsible Innovation</h4>\n<p>As AI becomes more powerful, responsibility becomes more important. Developing AI should not only focus on creating smarter systems.</p>\n<p>It should also focus on:</p>\n<ul>\n<li>Protecting privacy</li>\n<li>Reducing unfairness</li>\n<li>Improving safety</li>\n<li>Making technology accessible</li>\n</ul>\n<p>Innovation and responsibility must grow together.</p>\n<h4>Looking Toward the Future</h4>\n<p>The future of AI is still unknown. There may be discoveries that we cannot imagine today. New technologies may change the way humans work, learn, and communicate.</p>\n<p>But one thing is certain:</p>\n<p>Understanding technology will become one of the most important skills of the future. People who understand AI will be better prepared to use its opportunities and face its challenges.</p>\n<h4>Final Message</h4>\n<p>Artificial Intelligence is not the end of human creativity or innovation. Instead, it represents a new chapter in the relationship between humans and technology. The future will not be created by machines alone. It will be created by people who use technology with curiosity, responsibility, and imagination. AI gives humanity a powerful tool. What happens next depends on how we choose to use it.</p>"}], "preface": ["Technology has always been an important part of human progress. Throughout history, new inventions have changed the way people live, communicate, and solve problems. From the first machines to the internet and smartphones, every major technological development has transformed society in different ways. Today, we are entering another important period with the rapid growth of Artificial Intelligence.", "Artificial Intelligence is no longer just an idea found in movies or science fiction stories. It has become a real technology that is already affecting many parts of our lives. AI can help people analyze information, understand languages, recognize images, discover new medicines, and create content. These abilities were once considered impossible for machines, but they are now becoming part of everyday technology.", "However, understanding AI is about more than knowing what it can do. It is also important to understand how it works, what technologies support it, and what challenges come with its development. As AI becomes more advanced, questions about privacy, ethics, jobs, and the relationship between humans and machines become increasingly important.", "This book explores Artificial Intelligence from its basic concepts to its future possibilities. It explains how machines learn, how AI systems are built, where AI is being used today, and what impact this technology may have on the world.", "The goal of this project is to make Artificial Intelligence easier to understand for everyone. AI is not only about machines becoming smarter. It is also about how humans use technology to solve problems, create new opportunities, and shape the future."], "about": ["Artificial Intelligence and the Future of Technology: From Algorithms to Human Innovation is a complete exploration of one of the most important technologies of our time.", "Many discussions about AI focus on only one topic, such as chatbots or automation. However, Artificial Intelligence is much larger than that. It includes many different technologies and ideas that work together to create intelligent systems.", "This blog covers the foundations of AI, including machine learning, neural networks, large language models, computer vision, and robotics. It also looks at how AI is changing different industries such as healthcare, education, business, science, cybersecurity, and entertainment.", "Beyond the technology itself, this book also focuses on the questions surrounding the future of AI. As these systems become more powerful, it is important to think about how they should be developed and used. Issues such as fairness, privacy, safety, and the future of work will play a major role in shaping the relationship between humans and AI.", "This project is written for anyone interested in understanding the technology that is shaping the future. Whether someone is discovering AI for the first time or already knows the basics, this book aims to provide a clear and complete view of how Artificial Intelligence works and why it matters."], "howToReadIntro": "This book is organized into four main parts. Each part focuses on a different side of Artificial Intelligence, starting from the basic ideas and moving toward future possibilities.", "partDescriptions": {"1": "The first part explains the foundations of Artificial Intelligence. It introduces how computers learn, how machine learning works, and how neural networks allow machines to recognize patterns and make decisions. It also explores technologies such as large language models, computer vision, and robotics.", "2": "The second part focuses on how AI is being used in the real world. It explores its impact on fields such as healthcare, education, business, science, cybersecurity, and entertainment. These examples show how AI is already helping people solve problems and create new possibilities.", "3": "The third part explores the technologies that make modern AI possible. It discusses the role of data, cloud computing, computer hardware, the internet, and other important technologies that support AI systems.", "4": "The final part looks at the future of Artificial Intelligence and the challenges that come with it. It discusses AI ethics, the impact of AI on jobs, safety concerns, future developments, and how humans and AI can work together. By following these sections, readers can understand AI from different perspectives, from the basic algorithms behind intelligent systems to the possible future of technology."}, "authorBio": {"name": "Riyad Khairoun", "role": "Computer Engineering Student, Morocco", "since": 2023, "bio": ["Hi, I'm Riyad Khairoun, a 17 year old student from Morocco and I'm passionate about computers and technology. I like building projects from the very first idea all the way to the interface people actually use, and I usually take the lead on things instead of waiting to be asked.", "I started this book in 2023 to explain Artificial Intelligence in a clear way without turning it into hype or jargon, and I built this website myself too. It's still growing chapter by chapter, alongside my other projects."], "socials": [{"label": "Snapchat", "handle": "vampriyad"}, {"label": "Reddit", "handle": "u/vampriyad"}, {"label": "TikTok", "handle": "@vampriyad"}, {"label": "Instagram", "handle": "vampriyad"}]}}</script>
<script>
(function(){
  const DATA = JSON.parse(document.getElementById('book-data').textContent);
  const app = document.getElementById('app');

  function el(tag, attrs, children){
    attrs = attrs || {};
    const n = document.createElement(tag);
    for(const k in attrs){
      if(k === 'html'){ n.innerHTML = attrs[k]; }
      else if(k === 'class'){ n.className = attrs[k]; }
      else if(k.startsWith('on')){ n.addEventListener(k.slice(2), attrs[k]); }
      else { n.setAttribute(k, attrs[k]); }
    }
    (children||[]).forEach(c=>{ if(c) n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    return n;
  }

  function chapterByNum(n){ return DATA.chapters.find(c=>c.num===n); }
  function partForChapter(n){ return DATA.parts.find(p => n>=p.range[0] && n<=p.range[1]); }

  function orderedAvailable(){
    const list = [{num:0, title:'Introduction', kind:'intro'}];
    DATA.chapters.forEach(c=>{ if(c.available) list.push({num:c.num, title:c.title, kind:'chapter'}); });
    return list;
  }

  function renderHome(){
    const root = el('div', {class:'view active'});

    root.appendChild(topbar('home'));
    const hero = el('section', {class:'hero'});
    const grid = el('div', {class:'wrap hero-grid'});

    const left = el('div');
    left.appendChild(el('p', {class:'eyebrow'}, ['Nonfiction — Technology']));
    left.appendChild(el('h1', {class:'title'}, [DATA.title]));
    left.appendChild(el('p', {class:'subtitle-line'}, [DATA.subtitle]));
    left.appendChild(el('p', {class:'hero-hook'}, ['Many discussions about AI focus on only one topic, such as chatbots or automation — but Artificial Intelligence is much larger than that. This book maps the whole picture, from how machines learn to what it means for the future of work, creativity, and human judgment.']));
    const actions = el('div', {class:'hero-actions'});
    actions.appendChild(el('a', {class:'btn btn-primary', href:'#/chapter/0', onclick:(e)=>{e.preventDefault(); navigate('#/chapter/0');}}, ['Start Reading →']));
    actions.appendChild(el('a', {class:'btn btn-ghost', href:'#/contents', onclick:(e)=>{e.preventDefault(); document.getElementById('full-toc').scrollIntoView({behavior:'smooth'});}}, ['Table of Contents']));
    left.appendChild(actions);
    left.appendChild(el('p', {class:'byline'}, ['by ', el('strong',{},[DATA.author])]));
    grid.appendChild(left);

    const right = el('div');
    const stack = el('div', {class:'layerstack'});
    [...DATA.parts].reverse().forEach((p,i)=>{
      const layer = el('div', {class:'layer', onclick:()=>{ navigate('#/'); setTimeout(()=>document.getElementById('full-toc').scrollIntoView({behavior:'smooth'}),50); }});
      layer.appendChild(el('div', {class:'layer-node'}));
      if(i < DATA.parts.length-1) layer.appendChild(el('div', {class:'layer-wire'}));
      const sig = el('div', {class:'signal'});
      sig.style.animationDelay = (i*0.7)+'s';
      layer.appendChild(sig);
      layer.appendChild(el('div', {class:'layer-index'}, ['PART 0'+p.part]));
      layer.appendChild(el('div', {class:'layer-title'}, [p.title]));
      layer.appendChild(el('div', {class:'layer-sub'}, ['CH. '+String(p.range[0]).padStart(2,'0')+'–'+String(p.range[1]).padStart(2,'0')]));
      stack.appendChild(layer);
    });
    right.appendChild(stack);
    grid.appendChild(right);
    hero.appendChild(grid);
    root.appendChild(hero);
    const pref = el('section', {class:'section section-paper'});
    const prefWrap = el('div', {class:'wrap'});
    prefWrap.appendChild(el('div', {class:'section-head'}, [
      el('span', {class:'section-label'}, ['Preface']),
    ]));
    const prefBody = el('div', {class:'preface-body'});
    DATA.preface.forEach(p=> prefBody.appendChild(el('p', {}, [p])));
    prefWrap.appendChild(prefBody);
    pref.appendChild(prefWrap);
    root.appendChild(pref);
    const how = el('section', {class:'section'});
    const howWrap = el('div', {class:'wrap'});
    howWrap.appendChild(el('div', {class:'section-head'}, [
      el('span', {class:'section-label'}, ['How This Book Is Built']),
      el('h2', {class:'section-title'}, ['Four parts, one throughline']),
    ]));
    howWrap.appendChild(el('p', {style:'max-width:70ch;color:var(--ink-text-dim);font-size:15.5px;line-height:1.7;margin:-18px 0 32px;'}, [DATA.howToReadIntro]));
    const cards = el('div', {class:'partcards'});
    DATA.parts.forEach(p=>{
      const card = el('div', {class:'partcard', onclick:()=>{ document.getElementById('full-toc').scrollIntoView({behavior:'smooth'}); }});
      card.appendChild(el('span', {class:'partcard-index'}, ['0'+p.part]));
      card.appendChild(el('div', {class:'partcard-title'}, [p.title]));
      card.appendChild(el('div', {class:'partcard-desc'}, [DATA.partDescriptions[p.part]]));
      card.appendChild(el('span', {class:'partcard-range'}, ['CH '+String(p.range[0]).padStart(2,'0')+'–'+String(p.range[1]).padStart(2,'0')]));
      cards.appendChild(card);
    });
    howWrap.appendChild(cards);
    how.appendChild(howWrap);
    root.appendChild(how);

    const tocSec = el('section', {class:'section section-paper', id:'full-toc'});
    const tocWrap = el('div', {class:'wrap'});
    tocWrap.appendChild(el('div', {class:'section-head'}, [
      el('span', {class:'section-label'}, ['Table of Contents']),
      el('span', {class:'section-label'}, [DATA.chapters.filter(c=>c.available).length + ' of ' + DATA.chapters.length + ' chapters live']),
    ]));

    const introRow = tocRow({num:'—', title:'Introduction', available:true, minutes:DATA.introduction.minutes}, ()=>navigate('#/chapter/0'));
    tocWrap.appendChild(introRow);

    DATA.parts.forEach(p=>{
      const partBlock = el('div', {class:'toc-part'});
      partBlock.appendChild(el('div', {class:'toc-part-head'}, [
        el('span', {class:'toc-part-num'}, ['PART 0'+p.part]),
        el('span', {class:'toc-part-title'}, [p.title]),
      ]));
      for(let n=p.range[0]; n<=p.range[1]; n++){
        const c = chapterByNum(n);
        partBlock.appendChild(tocRow(c, ()=>{ if(c.available) navigate('#/chapter/'+c.num); }));
      }
      tocWrap.appendChild(partBlock);
    });

    const concl = chapterByNum(25);
    const conclBlock = el('div', {class:'toc-part'});
    conclBlock.appendChild(el('div', {class:'toc-part-head'}, [
      el('span', {class:'toc-part-num'}, ['—']),
      el('span', {class:'toc-part-title'}, ['Conclusion']),
    ]));
    conclBlock.appendChild(tocRow(concl, ()=>{ if(concl.available) navigate('#/chapter/'+concl.num); }));
    tocWrap.appendChild(conclBlock);

    tocSec.appendChild(tocWrap);
    root.appendChild(tocSec);

    const about = el('section', {class:'section about-section', id:'about-author'});
    const aboutWrap = el('div', {class:'wrap'});
    aboutWrap.appendChild(el('div', {class:'section-head'}, [
      el('span', {class:'section-label'}, ['About the Author']),
    ]));
    const aboutGrid = el('div', {class:'about-grid'});

    const card = el('div', {class:'about-card'});
    card.appendChild(el('div', {class:'about-id'}, ['Writer of this book, creator of this website']));
    card.appendChild(el('div', {class:'about-name'}, [DATA.authorBio.name]));
    card.appendChild(el('div', {class:'about-role'}, [DATA.authorBio.role]));
    card.appendChild(el('div', {class:'about-since'}, ['Writing this book since ' + DATA.authorBio.since]));
    const socials = el('div', {class:'about-socials'});
    DATA.authorBio.socials.forEach(s=>{
      socials.appendChild(el('span', {class:'about-social'}, [
        el('span', {class:'plat'}, [s.label]), s.handle
      ]));
    });
    card.appendChild(socials);
    aboutGrid.appendChild(card);

    const bio = el('div', {class:'about-bio'});
    DATA.authorBio.bio.forEach(p=> bio.appendChild(el('p', {}, [p])));
    aboutGrid.appendChild(bio);

    aboutWrap.appendChild(aboutGrid);
    about.appendChild(aboutWrap);
    root.appendChild(about);

    const footer = el('footer', {class:'footer'});
    const fWrap = el('div', {class:'wrap footer-inner'});
    fWrap.appendChild(el('p', {}, ['© ' + new Date().getFullYear() + ' ' + DATA.author + ' — writing this book since ' + DATA.authorBio.since + '.']));
    fWrap.appendChild(el('p', {}, ['Written for anyone discovering AI for the first time, or looking to see the whole picture.']));
    footer.appendChild(fWrap);
    root.appendChild(footer);

    return root;
  }

  function tocRow(c, onClick){
    const available = c.available;
    const row = el('div', {class:'toc-row ' + (available?'available':'locked'), onclick: available?onClick:null});
    row.appendChild(el('span', {class:'toc-num'}, [typeof c.num === 'number' ? String(c.num).padStart(2,'0') : c.num]));
    row.appendChild(el('span', {class:'toc-title'}, [c.title]));
    if(available){
      row.appendChild(el('span', {class:'toc-meta'}, [c.minutes + ' min']));
      row.appendChild(el('span', {class:'toc-arrow'}, ['→']));
    } else {
      row.appendChild(el('span', {class:'toc-meta soon'}, ['Coming soon']));
    }
    return row;
  }

  function topbar(current){
    const bar = el('div', {class:'topbar'});
    const inner = el('div', {class:'topbar-inner'});
    inner.appendChild(el('a', {class:'brandmark', href:'#/', onclick:(e)=>{e.preventDefault(); navigate('#/');}}, [
      el('span', {class:'dot'}), el('span', {}, ['AI ', el('strong',{},['& the Future of Technology'])])
    ]));
    const links = el('div', {class:'toplinks'});
    links.appendChild(el('a', {href:'#/', class: current==='home'?'current':''}, ['Home']));
    links.appendChild(el('a', {href:'#/chapter/0', class: current==='reader'?'current':''}, ['Read']));
    links.appendChild(el('a', {href:'#/', onclick:(e)=>{e.preventDefault(); navigate('#/'); setTimeout(()=>{const t=document.getElementById('about-author'); if(t) t.scrollIntoView({behavior:'smooth'});},50);}}, ['About']));
    links.appendChild(el('span', {class:'hide-mobile'}));
    inner.appendChild(links);
    bar.appendChild(inner);
    return bar;
  }

  function renderReader(num){
    const root = el('div', {class:'view active'});
    const shell = el('div', {class:'reader-shell'});

    const overlay = el('div', {class:'backdrop-overlay'});
    overlay.addEventListener('click', ()=>closeSidebar());

    const sidebar = buildSidebar(num);
    shell.appendChild(sidebar);

    const main = el('div', {class:'reader-main'});
    main.appendChild(buildReaderTopbar(num));

    const wrapEl = el('div', {class:'article-wrap'});
    const isIntro = num === 0;
    const data = isIntro ? DATA.introduction : chapterByNum(num);

    if(!data || !data.available){
      wrapEl.appendChild(el('p', {class:'article-eyebrow'}, ['Not published yet']));
      wrapEl.appendChild(el('h1', {class:'article-title'}, [data ? data.title : 'Chapter']));
      wrapEl.appendChild(el('p', {style:'color:var(--paper-text-dim);font-size:16px;'}, ['This chapter is part of the planned table of contents but hasn\'t been written yet. Check back soon.']));
    } else {
      const part = isIntro ? null : partForChapter(num);
      const eyebrowText = isIntro
        ? 'Introduction'
        : 'Chapter ' + String(num).padStart(2,'0') + (part ? ' · Part '+part.part : '') + ' · ' + data.minutes + ' min read';
      wrapEl.appendChild(el('p', {class:'article-eyebrow'}, [eyebrowText]));
      wrapEl.appendChild(el('h1', {class:'article-title'}, [data.title]));
      wrapEl.appendChild(el('div', {class:'article-body', html:data.html}));
      wrapEl.appendChild(buildChapterNav(num));
    }

    main.appendChild(wrapEl);
    shell.appendChild(main);
    root.appendChild(shell);
    root.appendChild(overlay);

    const focusExit = el('button', {class:'focus-exit', onclick:()=>toggleReaderFullscreen()});
    focusExit.appendChild(el('span', {html: ICON_COLLAPSE}));
    focusExit.appendChild(el('span', {}, ['Exit full screen']));
    shell.appendChild(focusExit);

    return root;
  }

  function buildSidebar(activeNum){
    const sb = el('div', {class:'reader-sidebar', id:'reader-sidebar'});
    sb.appendChild(el('button', {class:'sidebar-close', onclick:()=>closeSidebar()}, ['✕ Close']));
    const brand = el('a', {class:'sidebar-brand', href:'#/', onclick:(e)=>{e.preventDefault(); navigate('#/');}});
    brand.appendChild(el('span', {}, ['← Back to book site']));
    brand.appendChild(el('strong', {}, [DATA.title]));
    sb.appendChild(brand);

    const introRow = el('div', {class:'sb-row' + (activeNum===0?' active':''), onclick:()=>{navigate('#/chapter/0'); closeSidebar();}});
    introRow.appendChild(el('span', {class:'sb-num'}, ['—']));
    introRow.appendChild(el('span', {}, ['Introduction']));
    sb.appendChild(introRow);

    DATA.parts.forEach(p=>{
      sb.appendChild(el('div', {class:'sb-part-label'}, ['Part '+p.part+' · '+p.title]));
      for(let n=p.range[0]; n<=p.range[1]; n++){
        const c = chapterByNum(n);
        const row = el('div', {
          class:'sb-row ' + (c.available? '' : 'locked') + (activeNum===n?' active':''),
          onclick: c.available ? ()=>{navigate('#/chapter/'+n); closeSidebar();} : null
        });
        row.appendChild(el('span', {class:'sb-num'}, [String(n).padStart(2,'0')]));
        row.appendChild(el('span', {}, [c.title]));
        sb.appendChild(row);
      }
    });
    const conclRow = el('div', {
      class:'sb-row' + (activeNum===25?' active':''),
      onclick:()=>{navigate('#/chapter/25'); closeSidebar();}
    });
    conclRow.appendChild(el('span', {class:'sb-num'}, ['25']));
    conclRow.appendChild(el('span', {}, ['Conclusion']));
    sb.appendChild(conclRow);

    return sb;
  }

  const ICON_EXPAND = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>';
  const ICON_COLLAPSE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>';

  function toggleReaderFullscreen(){
    if(!document.fullscreenElement && !document.webkitFullscreenElement){
      (app.requestFullscreen || app.webkitRequestFullscreen || function(){}).call(app);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }
  function updateFullscreenBtn(){
    const btn = document.getElementById('fullscreen-btn');
    const shell = document.querySelector('.reader-shell');
    const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if(shell) shell.classList.toggle('focus-mode', isFull);
    if(!btn) return;
    btn.innerHTML = '';
    btn.appendChild(el('span', {html: isFull ? ICON_COLLAPSE : ICON_EXPAND}));
    btn.appendChild(el('span', {}, [isFull ? 'Exit full screen' : 'Full screen']));
  }
  document.addEventListener('fullscreenchange', updateFullscreenBtn);
  document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

  function buildReaderTopbar(num){
    const bar = el('div', {class:'reader-topbar'});
    const inner = el('div', {class:'reader-topbar-inner'});
    inner.appendChild(el('button', {class:'menu-btn', onclick:()=>openSidebar()}, ['☰']));
    const data = num===0 ? DATA.introduction : chapterByNum(num);
    inner.appendChild(el('span', {class:'reader-topbar-title'}, [data ? data.title : 'Chapter']));
    const fsBtn = el('button', {class:'fullscreen-btn', id:'fullscreen-btn', onclick:()=>toggleReaderFullscreen()});
    fsBtn.appendChild(el('span', {html: ICON_EXPAND}));
    fsBtn.appendChild(el('span', {}, ['Full screen']));
    inner.appendChild(fsBtn);
    inner.appendChild(el('a', {class:'home-link', href:'#/', onclick:(e)=>{e.preventDefault(); navigate('#/');}}, ['Home']));
    bar.appendChild(inner);
    setTimeout(updateFullscreenBtn, 0);
    const track = el('div', {class:'progress-track'});
    const fill = el('div', {class:'progress-fill', id:'progress-fill'});
    track.appendChild(fill);
    bar.appendChild(track);
    return bar;
  }

  function buildChapterNav(num){
    const nav = el('div', {class:'chapter-nav'});
    const order = orderedAvailable();
    const idx = order.findIndex(o=>o.num===num);
    const prev = idx>0 ? order[idx-1] : null;
    const next = idx<order.length-1 ? order[idx+1] : null;

    if(prev){
      nav.appendChild(el('div', {class:'chnav-btn', onclick:()=>navigate('#/chapter/'+prev.num)}, [
        el('span', {class:'chnav-label'}, ['← Previous']),
        el('span', {class:'chnav-title'}, [prev.title]),
      ]));
    } else {
      nav.appendChild(el('div', {class:'chnav-btn disabled'}, [el('span', {class:'chnav-label'}, ['← Previous']), el('span',{class:'chnav-title'},['Start of book'])]));
    }
    if(next){
      nav.appendChild(el('div', {class:'chnav-btn chnav-next', onclick:()=>navigate('#/chapter/'+next.num)}, [
        el('span', {class:'chnav-label'}, ['Next →']),
        el('span', {class:'chnav-title'}, [next.title]),
      ]));
    } else {
      nav.appendChild(el('div', {class:'chnav-btn chnav-next disabled'}, [el('span', {class:'chnav-label'}, ['Next →']), el('span',{class:'chnav-title'},['More chapters coming soon'])]));
    }
    return nav;
  }

  function openSidebar(){
    document.getElementById('reader-sidebar').classList.add('open');
    document.querySelector('.backdrop-overlay').classList.add('show');
  }
  function closeSidebar(){
    const sb = document.getElementById('reader-sidebar');
    if(sb) sb.classList.remove('open');
    const ov = document.querySelector('.backdrop-overlay');
    if(ov) ov.classList.remove('show');
  }

  function updateProgress(){
    const fill = document.getElementById('progress-fill');
    if(!fill) return;
    const h = document.documentElement.scrollHeight - window.innerHeight;
    const p = h>0 ? Math.min(100, Math.max(0,(window.scrollY/h)*100)) : 0;
    fill.style.width = p+'%';
  }

  function navigate(hash){
    if(location.hash === hash){ render(); }
    else { location.hash = hash; }
    window.scrollTo({top:0, behavior:'instant' in window ? 'instant' : 'auto'});
  }

  function render(){
    app.innerHTML = '';
    const hash = location.hash || '#/';
    const m = hash.match(/^#\/chapter\/(\d+)/);
    if(m){
      app.appendChild(renderReader(parseInt(m[1],10)));
    } else {
      app.appendChild(renderHome());
    }
    window.scrollTo(0,0);
  }

  window.addEventListener('hashchange', render);
  window.addEventListener('scroll', updateProgress);
  render();
})();
</script>
</body>
</html>
